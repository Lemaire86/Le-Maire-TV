<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE MAIRE TV - Adults</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <img src="logo-lmtv.png" class="nav-logo">
        <span class="nav-title">LE MAIRE TV ADULTS</span>
    </div>
    <div class="nav-right"></div>
</div>

<!-- LOGOUT BUTTON -->
<button onclick="logoutAdult()" style="margin-top:75px; margin-left:20px;">Logout</button>

<!-- ============================
     PIN OVERLAY (MUST BE FIRST)
============================ -->
<div id="pinOverlay" class="pin-overlay">
    <div class="pin-box">
        <h2>Enter PIN</h2>
        <input type="password" id="pinInput" maxlength="4" placeholder="****">
        <button id="pinSubmit">Unlock</button>
        <p id="pinError" class="pin-error"></p>
    </div>
</div>

<!-- PAGE WRAPPER -->
<div class="section-wrapper">

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn">☰ MENU</button>

        <div class="inside" id="menuPanel">
            <a class="nav-item" href="index.html">🏠 HOME</a>
            <a class="nav-item" href="livetv.html">📺 LIVE TV</a>
            <a class="nav-item" href="movies.html">🎬 MOVIES</a>
            <a class="nav-item" href="videos.html">🎞️ VIDEOS</a>
            <a class="nav-item" href="cartoons.html">🧸 CARTOONS</a>
            <a class="nav-item" href="musics.html">🎵 MUSICS</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search adults...">
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="video-layout">

        <!-- PLAYER -->
        <div class="player-box">
            <video id="player" controls></video>

            <div class="media-controls">
                <button id="prevBtn" class="media-btn">⏮</button>
                <button id="nextBtn" class="media-btn">⏭</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="list-panel">

            <div class="list-header">
                <button id="btnBack" class="nav-folder-btn">⬅ Back</button>
                <button id="btnRoot" class="nav-folder-btn">🏠 Root</button>
                <span id="currentPathLabel" class="path-label"></span>
            </div>

            <div class="list-content" id="listContent"></div>

        </div>

    </div>

</div>

<!-- ============================
     PIN SCRIPT (AFTER HTML)
============================ -->
<script>
const CORRECT_PIN = "2026";

if (localStorage.getItem("adultAccess") !== "true") {
    document.getElementById("pinOverlay").style.display = "flex";
}

document.getElementById("pinSubmit").onclick = () => {
    const pin = document.getElementById("pinInput").value;

    if (pin === CORRECT_PIN) {
        localStorage.setItem("adultAccess", "true");
        document.getElementById("pinOverlay").style.display = "none";
    } else {
        document.getElementById("pinError").textContent = "Incorrect PIN";
    }
};
</script>

<!-- ADULTS SECTION SCRIPT -->
<script src="section-adults.js"></script>

<!-- MENU TOGGLE -->
<script>
document.getElementById("menuBtn").addEventListener("click", () => {
    document.getElementById("menuPanel").classList.toggle("show");
});
</script>

<!-- LOGOUT FUNCTION -->
<script>
function logoutAdult() {
    localStorage.removeItem("adultAccess");
    location.reload();
}
</script>

</body>
</html>
