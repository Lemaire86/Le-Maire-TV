<!-- HAVE FUN SECTION -->
<section class="fun-section scroll-animate">

        <video id="funPlayer" muted playsinline controls class="fun-video">
            <source id="funSource" src="" type="video/mp4">

<div class="fun-controls">

<!-- POPUP ADULT PIN -->
<div id="adultPinModal" class="pin-modal">

          <button id="adultPinClose" class="pin-btn pin-close">Close</button>
      </div>
  </div>

<!-- MENU SCRIPT -->
<script>
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

menuBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    menuPanel.classList.toggle("show");
});

// Fèmen meni an si moun klike deyò
document.addEventListener("click", (e) => {
    if (!menuPanel.contains(e.target) && e.target !== menuBtn) {
        menuPanel.classList.remove("show");
    }
});
</script>

<!-- SCROLL ANIMATION -->
<script>
const elements = document.querySelectorAll('.scroll-animate, .zoom-animate');

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
}, { threshold: 0.2 });

elements.forEach(el => observer.observe(el));
</script>

<!-- INTRO SCRIPT — JWE SELMAN LÈ SIT LA OUVRI -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const intro = document.querySelector(".intro-screen");
    const sound = document.getElementById("introSound");

    // JWE SELMAN LÈ SIT LA OUVRI
    if (!sessionStorage.getItem("introPlayed")) {

        // jwe son an (Solisyon #1)
        sound.volume = 0.7;
      sound.play().catch(() => {
    document.addEventListener("touchstart", () => sound.play(), { once: true });
});

        // kite intro a jwe pou 2.5s
        setTimeout(() => {
            intro.classList.add("hide");
            document.body.classList.add("intro-done");
        }, 2500);

        sessionStorage.setItem("introPlayed", "yes");

    } else {
        intro.style.display = "none";
        document.body.classList.add("intro-done");
    }

});
</script>

    ];

    let index = Math.floor(Math.random() * funVideos.length);

    const player = document.getElementById("funPlayer");
    const source = document.getElementById("funSource");
    const box = document.querySelector(".fun-video-box");

    function loadVideo(i) {
        index = (i + funVideos.length) % funVideos.length;
        source.src = funVideos[index];
        player.load();
        player.play();
    }

    // FIRST VIDEO
    loadVideo(index);

    // AUTO NEXT WHEN FINISHED
    player.addEventListener("ended", () => loadVideo(index + 1));

    // NEXT BUTTON
    document.getElementById("funNext").addEventListener("click", () => {
        loadVideo(index + 1);
    });

    // PREVIOUS BUTTON
    document.getElementById("funPrev").addEventListener("click", () => {
        loadVideo(index - 1);
    });

    // AUTO RESIZE PLAYER
    player.addEventListener("loadedmetadata", () => {
        const w = player.videoWidth;
        const h = player.videoHeight;

        if (h > w) {
            box.style.maxWidth = "280px"; // portrait
        } else {
            box.style.maxWidth = "400px"; // landscape

<script>
const player = document.getElementById("funPlayer");
const box = document.querySelector(".fun-video-box");

player.addEventListener("loadedmetadata", () => {
    const w = player.videoWidth;
    const h = player.videoHeight;

    if (h > w) {
        // portrait
        box.style.maxWidth = "280px";
    } else {
        // landscape
        box.style.maxWidth = "400px";
    }
});
</script>

<script>
document.getElementById("funPlayer").addEventListener("click", () => {
    const player = document.getElementById("funPlayer");
    if (player.requestFullscreen) player.requestFullscreen();
});
</script>
